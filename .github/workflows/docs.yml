name: Docs
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install doc deps
        run: |
          python -m pip install -U pip
          # Either install dev extras...
          # pip install -e .[dev]
          # ...or install only what's needed for docs:
          pip install sphinx myst-parser furo sphinx-design myst-nb

      - name: Generate API stubs (sphinx-apidoc)
        run: |
          python -m sphinx.ext.apidoc -o docs/api src/PyTracerLab -f -e

      - name: Build HTML
        run: |
          sphinx-build -b html -W -E docs docs/_build/html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
